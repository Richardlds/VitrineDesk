<div class="admin-section fade-in p-0 m-0">
    <!-- WAPP CONTAINER -->
    <div class="wapp-container mx-4 mt-2">
        
        <!-- SIDEBAR -->
        <div class="wapp-sidebar">
            <div class="wapp-sidebar-header" style="justify-content: space-between;">
                <div class="flex align-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-primary flex align-center justify-center text-white">
                        <i data-lucide="life-buoy" class="icon-sm"></i>
                    </div>
                    <span class="text-primary font-bold">Meus Chamados</span>
                </div>
                <button id="btn-novo-chamado" class="btn btn-primary btn-icon rounded-full w-10 h-10 flex align-center justify-center p-0" title="Novo Chamado" style="min-width: 40px; cursor: pointer;">
                    <i data-lucide="plus" class="icon-sm m-0"></i>
                </button>
            </div>

            <!-- Pesquisa -->
            <div class="wapp-search-bar">
                <div class="wapp-search-input-wrapper">
                    <i data-lucide="search" class="icon-sm text-secondary"></i>
                    <input type="text" id="tk-search" class="wapp-search-input" placeholder="Pesquisar assunto...">
                </div>
            </div>

            <!-- Lista de Chats -->
            <div id="tk-list" class="wapp-chat-list custom-scrollbar">
                <!-- Preenchido via JS -->
            </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="wapp-main" id="tk-main-area" style="display: none;">
            
            <!-- Header -->
            <div class="wapp-main-header p-2 md:p-3">
                <div class="flex align-center gap-2 md:gap-3">
                    <button id="btn-tk-back" class="wapp-back-btn">
                        <i data-lucide="arrow-left" class="icon-sm m-0"></i>
                    </button>
                    <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-primary flex align-center justify-center text-white flex-shrink-0">
                        <i data-lucide="life-buoy" class="icon-sm"></i>
                    </div>
                    <div class="wapp-main-header-info">
                        <span id="tk-chat-subject" class="wapp-header-name">Assunto</span>
                        <span id="tk-chat-status" class="wapp-header-status mt-1">Status</span>
                    </div>
                </div>
            </div>

            <!-- Messages -->
            <div id="tk-chat-messages" class="wapp-messages-area custom-scrollbar">
                <!-- Preenchido via JS -->
            </div>

            <!-- Input Box -->
            <form id="form-chat-suporte" class="wapp-input-area m-0 border-none">
                <div class="wapp-input-wrapper">
                    <input type="text" id="tk-chat-input" class="wapp-input" placeholder="Digite sua mensagem..." required autocomplete="off">
                </div>
                <button type="submit" id="btn-send-ticket-message" class="wapp-send-btn bg-primary text-white border-none rounded-full w-10 h-10 flex align-center justify-center cursor-pointer ml-2 shadow-sm hover:opacity-90">
                    <i data-lucide="send" class="icon-sm" style="margin-left: -2px;"></i>
                </button>
            </form>
        </div>

        <!-- Placeholder (Quando não tem chat aberto) -->
        <div class="wapp-main" id="tk-chat-placeholder" style="align-items: center; justify-content: center; background-color: var(--color-bg-base);">
            <div class="flex flex-col align-center text-center p-4">
                <div class="w-24 h-24 rounded-full bg-placeholder flex align-center justify-center text-primary mb-4">
                    <i data-lucide="headphones" class="w-12 h-12"></i>
                </div>
                <h3 class="text-primary text-xl font-bold mb-2">Suporte VitrineDesk</h3>
                <p class="text-secondary text-sm max-w-sm">Selecione um chamado ao lado para ver o histórico ou abra um novo clicando no botão +</p>
            </div>
        </div>
    </div>

    <!-- Modal de Novo Chamado (Preservado) -->
    <div id="modal-suporte" class="modal-overlay d-none">
        <div class="modal-content config-card" style="max-width: 500px; width: 90%;">
            <div class="flex justify-between align-center mb-4 border-bottom-dashed pb-3">
                <h3 id="modal-suporte-title" class="text-primary font-bold">Novo Chamado</h3>
                <button id="btn-close-modal-suporte" class="btn bg-transparent border-none text-secondary cursor-pointer hover:text-danger">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <form id="form-suporte">
                <div class="mb-3">
                    <label class="font-medium text-sm text-secondary mb-1 inline-block">Assunto</label>
                    <input type="text" id="input-suporte-assunto" class="w-100 bg-placeholder border-dashed border-placeholder rounded-md px-3 py-2 text-primary outline-none text-sm" placeholder="Ex: Dúvida sobre Comissões" required>
                </div>
                
                <div class="mb-3">
                    <label class="font-medium text-sm text-secondary mb-1 inline-block">Categoria</label>
                    <select id="input-suporte-categoria" class="w-100 bg-placeholder border-dashed border-placeholder rounded-md px-3 py-2 text-primary outline-none text-sm cursor-pointer">
                        <option value="duvida">Dúvida Geral</option>
                        <option value="erro">Reportar Erro / Bug</option>
                        <option value="financeiro">Financeiro / Assinatura</option>
                        <option value="sugestao">Sugestão de Melhoria</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="font-medium text-sm text-secondary mb-1 inline-block">Mensagem</label>
                    <textarea id="input-suporte-mensagem" rows="5" class="w-100 bg-placeholder border-dashed border-placeholder rounded-md px-3 py-2 text-primary outline-none text-sm resize-none" placeholder="Descreva seu problema com o máximo de detalhes..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 rounded-lg cursor-pointer flex align-center justify-center gap-2">
                    <i data-lucide="send" class="icon-sm"></i> Enviar Chamado
                </button>
            </form>
        </div>
    </div>
</div>
