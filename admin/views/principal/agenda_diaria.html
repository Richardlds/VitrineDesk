<div class="admin-section">
    <!-- Header -->
    <div class="flex flex-wrap justify-between align-start gap-3 mb-4">
        <div class="flex flex-column gap-3">
            <h2 class="mb-0 text-primary">Agenda Diária</h2>
            <!-- Navegação de Datas Avançada -->
            <div class="flex flex-column gap-3 mt-2 w-100">
                <!-- Acesso Rápido e Calendário -->
                <div class="flex flex-wrap align-center gap-2">
                    <button class="btn btn-outline text-secondary border-dashed px-3 py-1 text-sm rounded-md cursor-pointer" id="btn-date-ontem">Ontem</button>
                    <button class="btn bg-primary-light text-primary border border-primary px-3 py-1 text-sm rounded-md font-bold cursor-pointer" id="btn-date-hoje">Hoje</button>
                    <button class="btn btn-outline text-secondary border-dashed px-3 py-1 text-sm rounded-md cursor-pointer" id="btn-date-amanha">Amanhã</button>
                    
                    <div class="relative ml-2">
                        <button class="btn bg-placeholder border-none text-secondary flex align-center gap-2 px-3 py-1 rounded-md text-sm cursor-pointer" title="Escolher no calendário">
                            <i data-lucide="calendar" class="icon-sm"></i> Calendário
                        </button>
                        <input type="date" id="input-date-picker" class="absolute top-0 left-0 w-100 h-100 opacity-0 cursor-pointer">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Indicador de Realtime e Novo Agendamento -->
        <div class="flex flex-column align-end gap-2">
            <div class="live-indicator flex align-center gap-2 bg-success-light text-success px-3 py-1 rounded-full text-sm font-medium">
                <span class="live-dot"></span> Ao vivo
            </div>
            <!-- Ações Extras (Apenas p/ UI futura) -->
            <button class="btn btn-primary flex align-center gap-2 mt-2" id="btn-novo-agendamento">
                <i data-lucide="plus"></i> Novo Agendamento
            </button>
        </div>
    </div>

    <!-- Filtros em Barra (Scrollable no mobile) -->
    <div class="relative w-100 mb-4 filters-scroll-wrapper">
        <div class="agenda-filters-bar mb-0">
            <!-- Filtro de Equipe -->
            <div class="agenda-filter-group border-right-dashed pr-3 mr-1" id="filter-profs">
                <!-- Injetado via JS -->
            </div>
            
            <!-- Filtro de Status -->
            <div class="agenda-filter-group" id="filter-status">
                <span class="text-xs text-secondary font-medium mr-1 uppercase">Status:</span>
                <button class="agenda-filter-pill active" data-status="all">Todos</button>
                <button class="agenda-filter-pill" data-status="pending">Pendentes</button>
                <button class="agenda-filter-pill" data-status="completed">Concluídos</button>
            </div>
        </div>
    </div>

    <!-- Container da Matriz de Horários -->
    <div class="agenda-matrix-container relative">
        <!-- Loading Overlay -->
        <div id="agenda-loading" class="absolute w-100 h-100 flex align-center justify-center bg-bg-surface z-50 transition-opacity">
            <div class="flex flex-column align-center gap-3">
                <i data-lucide="loader-2" class="animate-spin text-primary icon-lg"></i>
                <span class="text-secondary font-medium">Carregando agenda...</span>
            </div>
        </div>

        <!-- Matriz Gerada dinamicamente -->
        <div id="agenda-matrix-wrapper" class="agenda-matrix-wrapper">
            <!-- Slots renderizados pelo JS -->
        </div>
    </div>
</div>
