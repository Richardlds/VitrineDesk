<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin | VitrineDesk</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https: wss: https://*.supabase.co https://api.ipify.org; img-src 'self' data: https:; frame-src 'self';">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: #13131a;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--error);
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }

        .loading-spinner {
            display: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Basic Toast Styles for Superadmin Login if components.css is not loaded */
        #toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(19, 19, 26, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            border-radius: 12px;
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: translateX(100%) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 300px;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }
        .toast::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 4px 0 0 4px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }
        .toast-icon { display: flex; align-items: center; justify-content: center; }
        .toast-icon svg { width: 20px; height: 20px; }
        .toast.success::before { background: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .toast.success .toast-icon { color: #10b981; }
        .toast.error::before { background: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .toast.error .toast-icon { color: #ef4444; }
        .toast.warning::before { background: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
        .toast.warning .toast-icon { color: #f59e0b; }
        .toast.info::before { background: #6366f1; box-shadow: 0 0 10px rgba(99, 102, 241, 0.4); }
        .toast.info .toast-icon { color: #6366f1; }
        .toast-message { flex: 1; line-height: 1.4; }

    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1 class="extracted-style-357 flex align-center justify-center gap-2">
                <i data-lucide="zap" class="w-8 h-8 text-danger"></i> VitrineDesk God <span class="text-base text-danger">⚡</span>
            </h1>
            <p>Acesso Restrito: Nível Master</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="admin@vitrinedesk.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" id="btn-login" class="btn-primary">
                <span class="loading-spinner" id="login-spinner"></span>
                Entrar no Painel
            </button>
        </form>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { login, requireGuest } from '/admingod/js/admingod-auth.js';
        import { showToast } from '/js/utils.js';

        document.addEventListener('DOMContentLoaded', async () => {
            // Se já estiver logado, vai pro dashboard
            await requireGuest();

            const form = document.getElementById('login-form');
            const btnLogin = document.getElementById('btn-login');
            const spinner = document.getElementById('login-spinner');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                if (!email || !password) return;

                // Loading state
                btnLogin.disabled = true;
                spinner.style.display = 'inline-block';

                try {
                    await login(email, password);
                    showToast('Login realizado com sucesso!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } catch (error) {
                    console.error(error);
                    showToast(error.message || 'Erro ao realizar login. Verifique as credenciais.', 'error');
                } finally {
                    btnLogin.disabled = false;
                    spinner.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
